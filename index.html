<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />

    <title>Find the Goods</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link href="/styles.css" rel="stylesheet" />
    <script>
      function fitToScreen() {
        const W = 320,
          H = 480; // must match container exactly
        const scale = Math.min(
          window.innerWidth / W,
          window.innerHeight / H,
          1,
        );
        document.documentElement.style.setProperty("--scale", scale);
      }
      fitToScreen();
      window.addEventListener("resize", fitToScreen);
    </script>

    <script src="/app.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div id="ad">
        <button id="audio-toggle" aria-label="Toggle sound">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="#fff"
          >
            <path d="M3 10v4h4l5 5V5L7 10H3z" />
            <path
              d="M14.5 12c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02z"
            />
            <path
              d="M14.5 3.97v2.16c2.89 1 5 3.77 5 6.87s-2.11 5.87-5 6.87v2.16c4.01-1.05 7-4.71 7-9.03s-2.99-7.98-7-9.03z"
            />
          </svg>
        </button>
        <div class="border-top"></div>
        <div class="border-bot"></div>

        <div class="header">
          <img
            src="/images/header_title.png"
            alt="Litto"
            class="header_main_title"
          />
        </div>
        <div class="header_border_bottom"></div>

        <div class="felt" id="felt">
          <div class="result-flash" id="flash"></div>
          <div class="table-edge"></div>
          <div class="ball" id="ball">
            <img src="/images/beer_pong_ball.png" alt="ball" />
          </div>

          <div class="cup" id="cup0">
            <img class="cup-img" src="/images/beer_pong_cup.png" alt="cup" />
          </div>
          <div class="cup" id="cup1">
            <img class="cup-img" src="/images/beer_pong_cup.png" alt="cup" />
          </div>
          <div class="cup" id="cup2">
            <img class="cup-img" src="/images/beer_pong_cup.png" alt="cup" />
          </div>
        </div>

        <div class="status" id="status">✦ &nbsp; Watch carefully &nbsp; ✦</div>

        <div class="disclaimer">Disclaimer: 21+ Only</div>

        <div class="footer">
          <img
            src="/images/claim_your_prize.png"
            id="cta"
            alt="Claim Your Prize"
          />
          <img src="/images/play_again.png" id="again" alt="Play Again" />
        </div>
      </div>
    </div>
  </body>
</html>
